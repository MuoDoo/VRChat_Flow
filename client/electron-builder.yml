appId: com.vrcflow.app
productName: VRCFlow
directories:
  buildResources: build
  output: release
files:
  - dist
  - dist-electron
extraResources:
  - from: resources/openvr_api.dll
    to: openvr_api.dll
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
